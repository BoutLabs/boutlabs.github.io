<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">Bout Labs</title>
  <desc id="hero-desc">Abstract geometric hero in the Bout Labs blue palette — layered horizon bands and a subtle circular mark.</desc>

  <!-- Base: deep Bout Labs blue with subtle vertical gradient for depth -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2d7a"/>
      <stop offset="100%" stop-color="#2a3b97"/>
    </linearGradient>
    <linearGradient id="bandGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2a5197" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#2a5197" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="800" fill="url(#bgGrad)"/>

  <!-- Structural guide lines — subtle horizon scaffolding -->
  <g stroke="rgba(255,255,255,0.05)" stroke-width="1" fill="none">
    <line x1="0" y1="200" x2="1600" y2="200"/>
    <line x1="0" y1="400" x2="1600" y2="400"/>
    <line x1="0" y1="600" x2="1600" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="800"/>
    <line x1="800" y1="0" x2="800" y2="800"/>
    <line x1="1200" y1="0" x2="1200" y2="800"/>
  </g>

  <!-- Layered angular bands rising from bottom-right — three analog blues -->
  <polygon points="0,800 1600,800 1600,520 0,680" fill="url(#bandGrad)"/>
  <polygon points="180,800 1600,800 1600,620 380,750" fill="#2a6797" opacity="0.85"/>
  <polygon points="540,800 1600,800 1600,700 760,790" fill="#3a7bc8" opacity="0.55"/>

  <!-- Bout Labs circle mark — offset, subtle, echoing the logotype mark without being the logo -->
  <g transform="translate(1280, 220)">
    <circle r="135" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="2"/>
    <circle r="90" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <circle r="45" fill="rgba(255,255,255,0.08)"/>
  </g>

  <!-- One sharper diagonal accent stroke — light, brand-color-warm -->
  <line x1="0" y1="500" x2="1600" y2="120" stroke="rgba(255,255,255,0.10)" stroke-width="1.5"/>
</svg>

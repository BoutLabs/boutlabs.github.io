title: Bout Labs
email: jcurry@boutlabs.com
description: >- # this means to ignore newlines until "baseurl:"
  Bout Labs is your trusted technology partner. We bring the right resources
  at the right time to make your ideas a reality. Our human-centered approach
  to software makes us the perfect complement to your team. We help you
  quickly make the right decisions to move your projects and your team forward.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://www.boutlabs.com" # the base hostname & protocol for your site
twitter_username: boutlabs
github_username:  BoutLabs
capsule_webform_key: e9dfc9a9-f758-4f73-87ea-0bc3f71107c1
google_tracking_id: UA-143690680-1
timezone: America/New_York

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap
sass:
  sass_dir: _sass
  style: compressed
defaults:
  - scope:
      path: "assets/images"
    values:
      image: true
permalink: pretty
# paginate: 10
# paginate_path: "/blog/page:num/"

collections:
  services:
    available: true
  projects:
    output: true
    permalink: /projects/:name/

# Exclude from processing.
# When set, this REPLACES Jekyll's default exclude list (which is why the
# Jekyll defaults are spelled out below).
exclude:
  # Jekyll defaults
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  # Repo-meta — cornerman + hypeman + top-level docs not meant for the public site
  - AGENT_COMMS.log
  - CLAUDE.md
  - CONTRIBUTING.md
  - README.md
  - Rakefile
  - docs/
  - jtbd/
  - marketing/
  - scripts/
